name: CI

on:
  push:
    paths:
      - 'custom_components/**'
      - 'tests/**'
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - 'custom_components/**'
      - 'tests/**'
  workflow_dispatch:

jobs:

  black:
    name: Python Code Format Check
    runs-on: ubuntu-latest
    steps:
      - name: Check out code from GitHub
        uses: "actions/checkout@v3"
      - name: Black Code Format Check
        uses: lgeiger/black-action@master
        with:
          args: ". --check --fast --diff"

  tests:
    name: Python Tests
    runs-on: ubuntu-latest
    steps:
      - name: Check out code from GitHub
        uses: "actions/checkout@v3"
      - name: Set up Python 3.12
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'
      - name: Generate Requirements lists
        run: |
          python3 .github/generate_requirements.py
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          # requirements_tests.txt is intentionally NOT installed here:
          # the Pipfile [dev-packages] block pins ancient pytest/mypy/astroid
          # versions (from 2020) that transitively pull typed-ast, which has
          # no wheels for Python 3.12+ and fails to compile against modern
          # CPython headers. The pytest step below is commented out anyway,
          # so we don't actually need those test deps to run flake8.
      - name: Lint with flake8
        run: |
          pip install flake8
          flake8 . --count --select=E9,F63,F7,F82 --ignore W503,E722,F722  --show-source --statistics
          flake8 . --count --exit-zero --max-complexity=15 --max-line-length=127 --statistics
  #     - name: Test with pytest
  #       run: |
  #         pip install pytest
  #         pytest

  security:
    name: Security check - Bandit
    needs: [tests]
    runs-on: ubuntu-latest
    steps:
      - name: Check out code from GitHub
        uses: "actions/checkout@v3"
      - name: Set up Python 3.12
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'
      - name: Install Bandit
        # Replaced ioggstream/bandit-report-artifacts@v0.0.2 — that action's
        # Dockerfile builds on python:3.8-slim-buster, whose Debian apt repos
        # returned 404 after Buster reached EOL (2024-06) and was archived
        # (2024-09). The action has not been updated since 2020.
        run: pip install bandit
      - name: Run Bandit
        run: |
          mkdir -p output
          # The pre-existing .github/bandit.yaml referenced by the old action
          # was never committed; bandit's defaults (skip B101 etc.) are fine
          # for a HACS integration. -ll = report MEDIUM+ severity only.
          bandit -r custom_components/mikrotik_router -ll -f txt -o output/security_report.txt
      - name: Security check report artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: Security report
          path: output/security_report.txt

  validate:
    name: Check hassfest
    needs: [tests]
    runs-on: "ubuntu-latest"
    steps:
      - name: Check out code from GitHub
        uses: "actions/checkout@v3"
      - name: Run hassfest
        uses: home-assistant/actions/hassfest@master
